<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>小红书封面 · 手绘风</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Architects+Daughter&display=swap');

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #E8E2D5;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
  }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 80px;
  }
  .toolbar {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 12px;
    z-index: 100;
  }
  .btn {
    padding: 12px 22px;
    border: 1.5px solid #2C2520;
    background: #F5F0E6;
    color: #2C2520;
    font-size: 15px;
    font-weight: 600;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(44, 37, 32, 0.12);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    font-family: inherit;
  }
  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(44, 37, 32, 0.18);
  }
  .btn:active { transform: translateY(0); }
  .btn[disabled] { opacity: 0.5; cursor: wait; }
  .btn.primary {
    background: #2C2520;
    color: #F5F0E6;
  }
  .stage {
    width: min(540px, 90vw);
    aspect-ratio: 3 / 4;
    background: #fff;
    box-shadow: 0 20px 60px rgba(44, 37, 32, 0.25);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .stage svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .meta {
    margin-top: 24px;
    color: #6B5D4F;
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
  }
  .meta code {
    background: #F5F0E6;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 12px;
  }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2C2520;
    color: #F5F0E6;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 200;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="toolbar">
  <button class="btn" id="copy-btn">复制图片</button>
  <button class="btn primary" id="download-btn">下载 PNG</button>
</div>

<div class="stage" id="stage">
<!-- SVG_HERE -->
</div>

<div class="meta">
  小红书封面 · 1242 × 1660 · 手绘笔记本风格<br>
  下载的 PNG 可直接上传到小红书 <code>原始尺寸</code>
</div>

<div class="toast" id="toast"></div>

<script>
const SVG_WIDTH = 1242;
const SVG_HEIGHT = 1660;
const FONT_CSS_URL = 'https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Architects+Daughter&display=swap';

const $ = (id) => document.getElementById(id);
const stage = $('stage');
const downloadBtn = $('download-btn');
const copyBtn = $('copy-btn');
const toast = $('toast');

function showToast(msg, ms = 1800) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), ms);
}

async function fetchInlinedFontsCSS() {
  const cssText = await fetch(FONT_CSS_URL, {
    headers: { 'User-Agent': 'Mozilla/5.0' }
  }).then(r => r.text());
  const fontUrls = [...cssText.matchAll(/url\((https:[^)]+)\)/g)].map(m => m[1]);
  const replacements = await Promise.all(fontUrls.map(async (url) => {
    try {
      const buf = await fetch(url).then(r => r.arrayBuffer());
      let bin = '';
      const bytes = new Uint8Array(buf);
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      const b64 = btoa(bin);
      return [url, `data:font/woff2;base64,${b64}`];
    } catch (e) {
      return [url, url];
    }
  }));
  let inlined = cssText;
  for (const [orig, dataUri] of replacements) {
    inlined = inlined.split(orig).join(dataUri);
  }
  return inlined;
}

async function svgToPngBlob(scale = 1) {
  const svgEl = stage.querySelector('svg');
  if (!svgEl) throw new Error('SVG not found');

  const clone = svgEl.cloneNode(true);
  if (!clone.getAttribute('xmlns')) clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  if (!clone.getAttribute('viewBox')) clone.setAttribute('viewBox', `0 0 ${SVG_WIDTH} ${SVG_HEIGHT}`);
  clone.setAttribute('width', SVG_WIDTH);
  clone.setAttribute('height', SVG_HEIGHT);

  const inlinedCSS = await fetchInlinedFontsCSS();
  let defs = clone.querySelector('defs');
  if (!defs) {
    defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    clone.insertBefore(defs, clone.firstChild);
  }
  const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
  styleEl.textContent = inlinedCSS;
  defs.insertBefore(styleEl, defs.firstChild);

  const serializer = new XMLSerializer();
  const svgString = serializer.serializeToString(clone);
  const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);

  try {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = (e) => reject(new Error('SVG image load failed'));
      img.src = url;
    });

    const canvas = document.createElement('canvas');
    canvas.width = SVG_WIDTH * scale;
    canvas.height = SVG_HEIGHT * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#F5F0E6';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    return await new Promise((resolve) => canvas.toBlob(resolve, 'image/png', 1));
  } finally {
    URL.revokeObjectURL(url);
  }
}

async function downloadPng() {
  downloadBtn.disabled = true;
  downloadBtn.textContent = '生成中…';
  try {
    await document.fonts.ready;
    const blob = await svgToPngBlob(1);
    const a = document.createElement('a');
    a.download = `xhs-cover-${Date.now()}.png`;
    a.href = URL.createObjectURL(blob);
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    showToast('PNG 已下载');
  } catch (e) {
    console.error(e);
    showToast('导出失败：' + e.message, 3000);
  } finally {
    downloadBtn.disabled = false;
    downloadBtn.textContent = '下载 PNG';
  }
}

async function copyPng() {
  copyBtn.disabled = true;
  copyBtn.textContent = '复制中…';
  try {
    await document.fonts.ready;
    const blob = await svgToPngBlob(1);
    if (!navigator.clipboard || !window.ClipboardItem) {
      throw new Error('当前浏览器不支持图片剪贴板，请用下载');
    }
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    showToast('已复制到剪贴板');
  } catch (e) {
    console.error(e);
    showToast(e.message, 3000);
  } finally {
    copyBtn.disabled = false;
    copyBtn.textContent = '复制图片';
  }
}

downloadBtn.addEventListener('click', downloadPng);
copyBtn.addEventListener('click', copyPng);
</script>

</body>
</html>
